[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm turbo build --filter=@pickle-play/api"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
startCommand = "cd apps/api && NODE_ENV=production node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
